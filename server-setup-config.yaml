# Version of the specs, only for internal usage if this format should ever change drastically
_specver: 2

# modpack related settings, changes the visual appearance of the launcher
modpack:
  # Name of the mod pack, that is displayed in various places where it fits
  name: Example Modpack

  # Description
  description: This is a awesome modpack about making examples.



# settings regarding the installation of the modpack
install:
  # Only needed for the 'curse' and 'curseid' formats, which are currently broken (see modpackFormat).
  # This field supports using an Environment Variable like ${CURSE_FORGE_API_KEY} so the key does not
  # have to be committed. An unset variable resolves to an empty string and logs a warning.
  curseForgeApiKey: ""

  # version of minecraft, needs the exact version
  mcVersion: "1.20.1"

  # exact version of forge or fabric that is supposed to be used
  # if this value is a null value so ( ~, null, or "" ) then the version from the mod pack is going to be used
  loaderVersion: "47.4.1"

  # If a custom installer is supposed to be used, specify the url here: (Otherwise put "", ~ or null here)
  # supports variables: {{@loaderversion@}} and {{@mcversion@}}
  # For Forge:  "https://maven.minecraftforge.net/net/minecraftforge/forge/{{@mcversion@}}-{{@loaderversion@}}/forge-{{@mcversion@}}-{{@loaderversion@}}-installer.jar"
  # For Fabric: "https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.0.3/fabric-installer-1.0.3.jar"
  installerUrl: "https://maven.minecraftforge.net/net/minecraftforge/forge/{{@mcversion@}}-{{@loaderversion@}}/forge-{{@mcversion@}}-{{@loaderversion@}}-installer.jar"

  # Installer Arguments
  # These Arguments have to be passed to the installer.
  # Note: these are passed through verbatim, the {{@mcversion@}} style placeholders are NOT
  # substituted here, so versions have to be written out in full.
  #
  # For Fabric:
  # installerArguments:
  #   - "server"
  #   - "-mcversion"
  #   - "1.20.1"
  #   - "-loader"
  #   - "0.15.11"
  #   - "-downloadMinecraft"
  #
  # For Forge:
  installerArguments:
    - "--installServer"

  # Link to where the modpack can be downloaded. This has to be a direct link to the file,
  # not a link to a download page.
  # This supports loading from local files as well, with file://{PathToFile} in the beginning.
  # Note: file://{PathToFile} does not need the full path, it can be a relative path.
  # E.g: modpackUrl: file://../modpacks/MyPack-Server-1.0.0.zip
  modpackUrl: "https://example.com/path/to/YourModpack-Server-1.0.0.zip"

  # This is used to specify in which format the modpack is distributed.
  # Supported values:
  # - zip or zipfile   -- a plain server pack archive. Use this one.
  # - curseforge or curse, curseid
  #     These talk to the CurseForge/CurseMeta APIs, which changed after this project was last
  #     maintained upstream. They are left in place but do not currently work.
  modpackFormat: zip

  # Settings which are specific to the format used, might not be needed in some cases.
  # For the curse formats this can hold an ignoreProject list of project IDs to skip, e.g:
  # formatSpecific:
  #   ignoreProject:
  #     - 263420
  #     - 317780
  formatSpecific: {}

  # The base path where the server should be installed to. "" or ~ means the current directory.
  # Use the current directory if the launcher sits in the server root, which is the usual setup.
  baseInstallPath: ""

  # a list of files which are supposed to be ignored when installing it from the client files
  # this can either use regex or glob {default glob: https://docs.oracle.com/javase/8/docs/api/java/nio/file/FileSystem.html#getPathMatcher-java.lang.String-}
  # specify with regex:.... or glob:.... if you want to force a matching type
  #
  # Worth adding here: any file the pack ships that you would rather manage yourself, such as
  # server.properties, so that reinstalling the pack does not overwrite your own settings.
  ignoreFiles:
    - mods/Overrides.txt
    - mods/optifine*.jar
    - mods/optiforge*.jar
    - resources/**
    - packmenu/**
    - openloader/resources/**

  # often a server needs more files, which are nearly useless on the client, such as tickprofiler
  # This is a list of files, each ' - ' is a new file:
  # url is the directlink to the file, destination is the path to where the file should be copied to
  additionalFiles: ~
    #- url: https://example.com/files/spark-forge.jar
    #  destination: mods/spark-forge.jar

  # For often there are configs which the user wants to change, here is the place to put the local
  # path to configs, jars or whatever. You can copy files or folders.
  localFiles: []
    #- from: local/server.properties
    #  to: server.properties

  # This makes the program check the folder for whether it is supposed to use the
  checkFolder: true

  # Whether to install the Loader (Forge or Fabric) or not, should always be true unless you only want to install the pack
  installLoader: true

  # Sponge bootstrapper jar URL
  # Only needed if you have spongefix enabled
  spongeBootstrapper: https://github.com/simon816/SpongeBootstrap/releases/download/v0.7.1/SpongeBootstrap-0.7.1.jar

  # Time in seconds before the connection attempt to any webservice like forge/curseforge times out
  # Only increase this timer if you have problems
  connectTimeout: 30

  # Time in seconds before the read attempt to any webservice like forge/curseforge times out
  # Only increase this timer if you have problems
  readTimeout: 30



# settings regarding the launching of the pack
launch:
  # applies the launch wrapper to fix sponge for a few mods
  spongefix: false

  # Use a RAMDisk for the world folder
  # case-sensitive; use only lowercase `true` or `false`
  # NOTE: The server must have run once fully before switching to `true`!
  # NOTE: This does NOT create a RAMDisk. It only rsyncs the world to and from ${levelName}_backup
  #       around launch and shutdown, so a tmpfs has to already be mounted at the world path.
  ramDisk: false

  # checks with the help of a few unrelated servers whether the machine is online.
  # This only logs a warning, it does not stop the install from being attempted.
  checkOffline: true

  # These servers are going to be checked:
  checkUrls:
    - https://github.com/
    - https://maven.minecraftforge.net/

  # specifies the max amount of ram the server is supposed to launch with
  maxRam: 5G

  # specifies the min amount of ram the server is supposed to launch with
  minRam: 2G

  # specifies whether the server is supposed to auto restart after a crash.
  # Set this to false if something else already supervises the process (a panel, systemd, docker),
  # so that it sees the real exit code and can apply its own restart policy.
  autoRestart: true

  # after a given amount of crashes in a given time the server will stop auto restarting
  crashLimit: 10

  # Time a crash should be still accounted for in the {crashLimit}
  # syntax is either [number]h or [number]min or [number]s
  crashTimer: 60min

  # Arguments that need to go before the 'java' argument, something like linux niceness
  # This is only a string, not a list.
  preJavaArgs: ~

  # Start File Name, variables: {{@loaderversion@}} and {{@mcversion@}}
  # This has to be the name the installer spits out
  # For Forge 1.12-: "forge-{{@mcversion@}}-{{@loaderversion@}}-universal.jar"
  # For Forge 1.13+: "forge-{{@mcversion@}}-{{@loaderversion@}}.jar"
  # For Fabric: "fabric-server-launch.jar"
  startFile: "forge-{{@mcversion@}}-{{@loaderversion@}}.jar"

  # This is the command how the server is supposed to be started.
  #
  # This is an argument array, not a command line. Every token has to be its own entry, INCLUDING
  # the value of an option, otherwise the loader receives "--option value" as one unrecognised
  # argument and refuses to start. So this:
  #  - "--fml.modLists pathToModListFile"
  # has to be written as:
  #  - "--fml.modLists"
  #  - "pathToModListFile"
  #
  # For <1.17 it should be
  #  - "-jar"
  #  - "{{@startFile@}}"
  #  - "nogui"
  # For >=1.17 it should be
  # - "@libraries/net/minecraftforge/forge/{{@mcversion@}}-{{@loaderversion@}}/{{@os@}}_args.txt"
  # - "nogui"
  startCommand:
    - "@libraries/net/minecraftforge/forge/{{@mcversion@}}-{{@loaderversion@}}/{{@os@}}_args.txt"
    - "nogui"

  # In case you have multiple javas installed you can add a absolute path to it here
  # The Path has to be enclosed in \" like in the example if it has spaces (or for safety just include them always.)
  # if the value is "", null, or ~ then 'java' from PATH is going to be used
  # Example: "\"C:/Program Files/Java/jre1.8.0_201/bin/java.exe\""
  # It also supports replacing with environment variables with ${ENV_VAR} e.g. ${JAVA_HOME}/bin/java.exe
  forcedJavaPath: ~

  # If you aren't sure what the java path is you can let serverstarter attempt to find the correct JVM
  # For this you need to have all available JVMs on the PATH.
  # Leave this empty if the machine only has the right JVM installed, or if a container already
  # pins the Java version, since the probing runs 'java -version' against every match on the PATH.
  # -> MC 1.12 to 1.16 requires java [8, 9, 10, 11]
  # -> MC 1.17 to 1.20.4 requires java [17]
  # -> MC 1.20.5+ requires java [21]
  supportedJavaVersions: [17]

  # Java args that are supposed to be used when the server launches
  # keep in mind java args often need ' - ' in front of it to work, use clarifying parentheses to make sure it uses it correctly
  # Keep in mind that some arguments only work on JRE 1.8
  # reference: https://aikar.co/2018/07/02/tuning-the-jvm-g1gc-garbage-collector-flags-for-minecraft/
  javaArgs:
    - "-XX:+UseG1GC"
    - "-XX:+ParallelRefProcEnabled"
    - "-XX:MaxGCPauseMillis=200"
    - "-XX:+UnlockExperimentalVMOptions"
    - "-XX:+DisableExplicitGC"
    - "-XX:+AlwaysPreTouch"
    - "-XX:G1NewSizePercent=30"
    - "-XX:G1MaxNewSizePercent=40"
    - "-XX:G1HeapRegionSize=8M"
    - "-XX:G1ReservePercent=20"
    - "-XX:G1HeapWastePercent=5"
    - "-XX:G1MixedGCCountTarget=4"
    - "-XX:InitiatingHeapOccupancyPercent=15"
    - "-XX:G1MixedGCLiveThresholdPercent=90"
    - "-XX:G1RSetUpdatingPauseTimePercent=5"
    - "-XX:SurvivorRatio=32"
    - "-XX:+PerfDisableSharedMem"
    - "-XX:MaxTenuringThreshold=1"
    - "-Dfml.readTimeout=90"                        # servertimeout
    - "-Dfml.queryResult=confirm"                   # auto /fmlconfirm
